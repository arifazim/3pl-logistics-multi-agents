apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: 3pl-dashboard
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      serviceAccountName: 3pl-dashboard-sa@PROJECT_ID.iam.gserviceaccount.com
      timeoutSeconds: 300
      containers:
      - image: REGION-docker.pkg.dev/PROJECT_ID/3pl-repo/3pl-dashboard:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: latest
        - name: GOOGLE_CLOUD_PROJECT
          value: "PROJECT_ID"
        - name: ALLOW_OFFLINE_AGENT
          value: "0"
        - name: MCP_USE_STDIO
          value: "0"
        - name: A2A_ENABLED
          value: "1"
